<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OberPoes — beheer</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23A8E6CF'/%3E%3Cstop offset='1' stop-color='%23FFB7B2'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='40' height='40' rx='12' fill='url(%23g)'/%3E%3Ctext x='20' y='27' font-family='sans-serif' font-size='20' font-weight='bold' fill='white' text-anchor='middle'%3EK%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="admin.html">
        <span class="logo-icon" aria-hidden="true">K</span>
        <span><span class="logo-kassa">Kassa</span><span class="logo-genda">Genda</span> <small>beheer</small></span>
      </a>
      <nav id="admin-menu" class="verborgen">
        <a href="#" id="menu-dashboard" class="actief">Dashboard</a>
        <a href="#" id="menu-aanvragen">Aanvragen</a>
        <a href="#" id="menu-tenants">Tenants</a>
        <a href="#" id="menu-uitloggen">Uitloggen</a>
      </nav>
    </div>
  </header>
  <main class="container">

    <!-- Login -->
    <div class="kaart" id="login-kaart" style="max-width: 420px; margin: 3rem auto;">
      <h2>Inloggen</h2>
      <div class="veld">
        <label for="gebruikersnaam">Gebruikersnaam</label>
        <input id="gebruikersnaam" type="text" autocomplete="username">
      </div>
      <div class="veld">
        <label for="wachtwoord">Wachtwoord</label>
        <input id="wachtwoord" type="password" autocomplete="current-password">
      </div>
      <span class="fout" aria-live="polite" id="fout-login"></span>
      <button class="knop" id="knop-login">Inloggen</button>
      <p class="melding melding-info">Demo: gebruikersnaam <code>oberpoes</code>, wachtwoord <code>miauw2026</code>.</p>
    </div>

    <!-- Applicatie -->
    <div id="admin-app" class="verborgen">
      <div id="view-dashboard"></div>
      <div id="view-aanvragen" class="verborgen"></div>
      <div id="view-tenants" class="verborgen"></div>
    </div>

  </main>
  <footer class="site-footer">© 2026 OberPoes — prototype</footer>
  <script src="js/validatie.js"></script>
  <script src="js/agenda.js"></script>
  <script src="js/lijst.js"></script>
  <script src="js/db.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
