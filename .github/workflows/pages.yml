name: Deploy naar GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4
      - name: Pages configureren
        uses: actions/configure-pages@v5
      - name: Site uploaden
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deployen
        id: deployment
        uses: actions/deploy-pages@v4
